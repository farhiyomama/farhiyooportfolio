<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Farhiyo Omar — Photographer</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;500&family=Jost:wght@200;300;400&display=swap" rel="stylesheet"/>
<style>
:root {
  --gold: #c9a96e;
  --gold-pale: #e8d5b0;
  --cream: #f0e6d0;
  --muted: rgba(232,213,176,0.6);
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; }
body {
  color: var(--cream);
  font-family: 'Jost', sans-serif;
  font-weight: 300;
  cursor: none;
  user-select: none;
  background: #0f0c08;
}
* { cursor: none; }

/* ── BACKGROUND ── */
.bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  background-image: var(--bg-img);
  background-size: cover;
  background-position: center;
  animation: bgFloat 18s ease-in-out infinite alternate;
  transform-origin: center;
}
@keyframes bgFloat {
  0%   { transform: scale(1.08) translate(0px, 0px); }
  25%  { transform: scale(1.1)  translate(-8px, -5px); }
  50%  { transform: scale(1.08) translate(5px, -8px); }
  75%  { transform: scale(1.11) translate(-5px, 6px); }
  100% { transform: scale(1.08) translate(8px, 3px); }
}

/* Vignette + dark overlay so text reads clearly */
.overlay {
  position: fixed;
  inset: 0;
  z-index: 1;
  background:
    radial-gradient(ellipse at 60% 50%, rgba(10,8,4,0.15) 0%, rgba(5,4,2,0.72) 100%),
    linear-gradient(to right, rgba(5,4,2,0.65) 0%, rgba(5,4,2,0.0) 45%, rgba(5,4,2,0.0) 60%, rgba(5,4,2,0.55) 100%),
    linear-gradient(to bottom, rgba(5,4,2,0.55) 0%, rgba(5,4,2,0.0) 20%, rgba(5,4,2,0.0) 80%, rgba(5,4,2,0.7) 100%);
}

/* Grain */
.grain {
  position:fixed; inset:0; z-index:2; pointer-events:none; opacity:.032;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:180px;
}

/* ── UI LAYER ── */
.ui { position:fixed; inset:0; z-index:10; pointer-events:none; }
.ui a { pointer-events:all; }

/* ── NAV ── */
nav {
  position:absolute; top:0; left:0; right:0;
  display:flex; align-items:center; justify-content:space-between;
  padding:2rem 2.8rem;
}
.nav-logo {
  font-family:'Cinzel',serif; font-size:.68rem; letter-spacing:.2em;
  text-transform:uppercase; line-height:1.6; color:var(--gold-pale);
}
.nav-logo span { display:block; font-size:.52rem; color:var(--gold); letter-spacing:.28em; }
.nav-links { display:flex; gap:2.5rem; list-style:none; }
.nav-links a {
  font-family:'Cinzel',serif; font-size:.58rem; letter-spacing:.18em;
  text-transform:uppercase; color:var(--cream); text-decoration:none;
  opacity:.72; transition:opacity .3s, color .3s; position:relative; padding-bottom:8px;
}
.nav-links a:hover { opacity:1; color:var(--gold); }
.nav-links li:first-child a { opacity:1; color:var(--gold-pale); }
.nav-links li:first-child a::after {
  content:''; position:absolute; bottom:0; left:50%; transform:translateX(-50%);
  width:4px; height:4px; border-radius:50%; background:var(--gold);
}
.nav-right {
  display:flex; align-items:center; gap:1.2rem;
  font-family:'Cinzel',serif; font-size:.58rem; letter-spacing:.18em;
  text-transform:uppercase; color:var(--cream); opacity:.72;
}
.nav-dot-ring {
  width:24px; height:24px; border-radius:50%;
  border:1px solid rgba(201,169,110,.5);
  display:flex; align-items:center; justify-content:center;
}
.nav-dot-inner { width:5px; height:5px; border-radius:50%; background:var(--gold); }

/* ── SIDE ICONS ── */
.side-icons {
  position:absolute; left:1.8rem; top:50%; transform:translateY(-50%);
  display:flex; flex-direction:column; gap:1.5rem;
}
.side-icons svg { width:18px; height:18px; opacity:.38; transition:opacity .3s; display:block; }
.side-icons svg:hover { opacity:.9; }

/* ── HERO TEXT ── */
.hero-content {
  position:absolute;
  left:3rem; top:0; bottom:0;
  display:flex; flex-direction:column; justify-content:center;
  max-width:52%;
}
.eyebrow {
  font-family:'Cinzel',serif; font-size:.58rem; letter-spacing:.26em;
  text-transform:uppercase; color:var(--gold); margin-bottom:1.8rem;
  opacity:0; animation:fadeUp .8s .3s forwards ease-out;
}
.hero-title {
  font-family:'Cormorant Garamond',serif; font-weight:300;
  font-size:clamp(4rem,9.5vw,8.8rem); line-height:.92; letter-spacing:-.01em;
  opacity:0; animation:fadeUp .9s .5s forwards ease-out;
  text-shadow: 0 2px 40px rgba(0,0,0,0.6);
}
.hero-title em { font-style:italic; color:var(--gold-pale); }

.hero-cta {
  margin-top:3rem;
  opacity:0; animation:fadeUp .8s .9s forwards ease-out;
}
.btn {
  display:inline-flex; align-items:center; gap:.9rem;
  border:1px solid rgba(201,169,110,.45); padding:.85rem 2rem;
  font-family:'Cinzel',serif; font-size:.58rem; letter-spacing:.2em;
  text-transform:uppercase; color:var(--cream); text-decoration:none;
  transition:border-color .3s, background .3s; backdrop-filter:blur(4px);
  background:rgba(0,0,0,0.15);
}
.btn:hover { border-color:var(--gold); background:rgba(201,169,110,.1); color:var(--gold-pale); }
.btn-star { color:var(--gold); }

/* vertical divider + body text */
.hero-body-wrap {
  position:absolute; left:48%; top:50%; transform:translateY(-50%);
  display:flex; gap:2rem; align-items:flex-start;
  opacity:0; animation:fadeIn .9s 1.1s forwards;
  max-width:280px;
}
.v-line {
  width:1px; height:120px; flex-shrink:0;
  background:linear-gradient(to bottom, transparent, var(--gold), transparent);
  margin-top:.4rem;
}
.hero-body {
  font-size:.95rem; line-height:1.9; color:var(--muted);
  text-shadow:0 1px 12px rgba(0,0,0,0.8);
}

/* ── SCROLL ── */
.scroll-hint {
  position:absolute; bottom:2.2rem; left:3rem;
  display:flex; flex-direction:column; gap:.5rem; align-items:flex-start;
  opacity:0; animation:fadeIn 1s 1.5s forwards;
}
.scroll-hint span {
  font-family:'Cinzel',serif; font-size:.5rem; letter-spacing:.28em;
  text-transform:uppercase; color:var(--gold);
}
.scroll-line {
  width:1px; height:44px;
  background:linear-gradient(to bottom, var(--gold), transparent);
  animation:scrollPulse 2.2s 2s infinite ease-in-out;
}
@keyframes scrollPulse {
  0%,100% { opacity:.35; transform:scaleY(1); }
  50%      { opacity:1;   transform:scaleY(1.12); }
}

/* ── SOUND badge ── */
.sound-badge {
  position:absolute; bottom:1.8rem; right:2.5rem;
  width:64px; height:64px;
  opacity:0; animation:fadeIn 1s 1.8s forwards;
}
.sound-badge svg { width:100%; height:100%; }

/* ── CURSOR ── */
#cursor {
  position:fixed; top:0; left:0; pointer-events:none; z-index:99999;
  width:42px; height:62px; transform:translate(-50%,-50%);
  transition:width .2s ease, height .2s ease, filter .2s ease;
}
#cursor.hovering { width:58px; height:82px; filter:brightness(1.2); }

.pearl {
  position:fixed; width:7px; height:7px; border-radius:50%;
  background:radial-gradient(circle at 30% 30%, white, #cfd8ff);
  pointer-events:none; z-index:99998;
  animation:pearlFade 1s forwards ease-out;
}
@keyframes pearlFade {
  0%   { opacity:.8; transform:scale(1); }
  100% { opacity:0;  transform:scale(.2) translateY(-20px); }
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(20px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes fadeIn {
  from { opacity:0; } to { opacity:1; }
}
</style>
</head>

document.getElementById('bgDiv').style.backgroundImage = `url('data:image/png;base64,${BG_DATA}')`;

// Parallax — background drifts gently with mouse
document.addEventListener('mousemove', e => {
  const xPct = (e.clientX / window.innerWidth  - 0.5) * 18;
  const yPct = (e.clientY / window.innerHeight - 0.5) * 12;
  document.getElementById('bgDiv').style.transform =
    `scale(1.1) translate(${-xPct}px, ${-yPct}px)`;
});

// ── CURSOR ──
const cursor = document.getElementById('cursor');
let mx=0,my=0,cx=0,cy=0;
function animCursor() {
  cx += (mx-cx)*0.15; cy += (my-cy)*0.15;
  cursor.style.left=cx+'px'; cursor.style.top=cy+'px';
  requestAnimationFrame(animCursor);
}
animCursor();

window.addEventListener('mousemove', e => {
  mx=e.clientX; my=e.clientY;
  if(Math.random()>0.82) spawnPearl(e.clientX,e.clientY);
});

document.querySelectorAll('a, .side-icons svg').forEach(el => {
  el.addEventListener('mouseenter',()=>cursor.classList.add('hovering'));
  el.addEventListener('mouseleave',()=>cursor.classList.remove('hovering'));
});

function spawnPearl(x,y) {
  const p=document.createElement('div');
  p.className='pearl';
  p.style.cssText=`left:${x}px;top:${y}px`;
  document.body.appendChild(p);
  setTimeout(()=>p.remove(),1000);
}

window.addEventListener('click',()=>{
  cursor.animate([
    {transform:'translate(-50%,-50%) scale(1)'},
    {transform:'translate(-50%,-50%) scale(1.4)'},
    {transform:'translate(-50%,-50%) scale(1)'}
  ],{duration:280,easing:'ease-out'});
});
</script>
